<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Newsletter · Missão Jocheved</title>
    <link rel="stylesheet" href="../assets/css/style.css" />
  </head>
  <body>
    <div class="page-shell">
      <section class="glass-card page">
        <h1>Newsletter</h1>
        <p>Estrutura pronta para receber nome e e-mail de pessoas que desejam acompanhar novidades.</p>
        <form>
          <label for="name">Nome</label><br />
          <input id="name" type="text" /><br /><br />
          <label for="email">E-mail</label><br />
          <input id="email" type="email" /><br /><br />
          <button class="btn btn-primary" type="submit">Inscrever</button>
        </form>
      </section>
    </div>
  </body>
</html>
