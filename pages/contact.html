<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contato · Missão Jocheved</title>
    <link rel="stylesheet" href="../assets/css/style.css" />
  </head>
  <body>
    <div class="page-shell">
      <section class="page contact-page">
        <a class="btn btn-secondary page-back-link" href="../index.html">← Voltar ao início</a>

        <div class="contact-grid">
          <div class="contact-card">
            <h1>Contato</h1>
            <p>Fale conosco para compartilhar ideias, mensagens ou pedidos de oração.</p>

            <form class="contact-form">
              <label>
                Número
                <input type="text" placeholder="(00) 00000-0000" />
              </label>

              <label>
                Instagram
                <input type="text" placeholder="@missaojocheved" />
              </label>

              <label>
                Facebook
                <input type="text" placeholder="Missão Jocheved" />
              </label>

              <label>
                E-mail
                <input type="email" placeholder="contato@missaojocheved.com" />
              </label>

              <label>
                Mensagem
                <textarea placeholder="Escreva sua mensagem..."></textarea>
              </label>
            </form>
          </div>

          <aside class="contact-info-card">
            <div class="contact-info-item">
              <span>Número</span>
              <div class="contact-info-box">+55 (00) 00000-0000</div>
            </div>

            <div class="contact-info-item">
              <span>Instagram</span>
              <div class="contact-info-box">@missaojocheved</div>
            </div>

            <div class="contact-info-item">
              <span>Facebook</span>
              <div class="contact-info-box">Missão Jocheved</div>
            </div>

            <div class="contact-info-item">
              <span>E-mail</span>
              <div class="contact-info-box">contato@missaojocheved.com</div>
            </div>

            <div class="contact-info-item">
              <span>Localização</span>
              <div class="contact-info-box location-box">Espaço para informar a cidade ou endereço da missão.</div>
            </div>
          </aside>
        </div>
      </section>
    </div>
  </body>
</html>
